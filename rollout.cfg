// __________________________________________________________________________________________________________________________________________________________________________

// Technical Overview

// Unlike listenserver.cfg, which automatically initializes the server environment, rollout.cfg is a state-modifier script 
// executed manually via the console (exec rollout). Its primary function is to override standard game loop variables and 
// provide immediate tools for sandbox navigation and instance resetting. 
// This configuration removes the standard resource constraints and provides essential binds to instantly reset your spatial positioning during testing.

// Entity State Manipulation (Health and Ammo)

// To facilitate uninterrupted practice, the player's resource constraints must be removed. 
// The engine handles infinite ammo via sv_infinite_ammo 1, which freezes the active weapon's clip array, effectively creating "instant" or non-existent reloads. 
// To survive continuous blast damage or fall damage, the hurtme command is passed a massive negative integer (e.g., hurtme -99999). 
// Mechanically, this overflows the player entity's health pool buffer, granting an astronomical overheal that functions as pseudo-invulnerability 
// without enabling god mode, meaning explosive knockback still functions normally.

// Spatial Navigation and Instance Resetting

// Practicing routes or testing map geometry requires frequent repositioning. Binding a key to noclip detaches the player's collision hull from the map's brush geometry, 
// allowing for frictionless, free-cam flight back to a starting position. 
// However, because precise spawn coordinates are often critical for timing, a secondary bind is used to trigger mp_restartgame 1. 
// This command forces the server state machine to wipe current entity positions and respawn the player precisely at the map's designated info_player_teamspawn coordinates,
// instantly resetting the environment.

// __________________________________________________________________________________________________________________________________________________________________________

// __________________________________________________________________________________________________________________________________________________________________________
//
// Map Entity Permissions - Required for complex training maps (e.g., tr_walkway) to execute internal logic.
//
// __________________________________________________________________________________________________________________________________________________________________________

sv_allow_point_servercommand always

// __________________________________________________________________________________________________________________________________________________________________________
//
// Sandbox Controls - Lifts engine restrictions for diagnostic overlays, noclip, and testing commands.
//
// __________________________________________________________________________________________________________________________________________________________________________

sv_cheats 1

// __________________________________________________________________________________________________________________________________________________________________________
//
// Game State Flow - Bypasses the standard round structure and "Waiting for Players" phases.
//
// __________________________________________________________________________________________________________________________________________________________________________

mp_tournament 1                     
mp_waitingforplayers_cancel 1       
mp_disable_respawn_times 1

// __________________________________________________________________________________________________________________________________________________________________________
//
// Time and Limits - Disables map rotation and round limits to prevent the server from restarting.
//
// __________________________________________________________________________________________________________________________________________________________________________

mp_timelimit 0                      
mp_winlimit 0                       
mp_maxrounds 0

// __________________________________________________________________________________________________________________________________________________________________________
//
// Networking and Accessibility - Set to 0 if you are port forwarding and want friends to join your listen server.
//
// __________________________________________________________________________________________________________________________________________________________________________

// sv_lan 1

// __________________________________________________________________________________________________________________________________________________________________________
//
// Entity State Manipulation (Health & Ammo) - Freezes the clip state (instant/no reload) and provides massive overheal.
//
// __________________________________________________________________________________________________________________________________________________________________________

sv_infinite_ammo 1
hurtme -99999

// __________________________________________________________________________________________________________________________________________________________________________
//
// Quality of Life Binds - 
// 'F' toggles collision logic for flying through geometry.
// 'R' (or any key you choose) instantly resets the map and spawn position.
//
// __________________________________________________________________________________________________________________________________________________________________________

bind f "noclip"
bind r "mp_restartgame 1"
