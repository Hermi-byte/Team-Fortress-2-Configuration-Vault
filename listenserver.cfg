// __________________________________________________________________________________________________________________________________________________________________________

// Technical Overview

// The listenserver.cfg file is automatically executed by the Source Engine whenever 
// a client hosts a local game session (a "listen server") via the in-game "Create Server" 
// menu or the map [mapname] console command. 
// Unlike a dedicated server (server.cfg), a listen server operates with the host acting as 
// both the server and a connected client. 
// This configuration is specifically designed to optimize the local environment for sandbox testing, 
// map development, rollout practice, 
// and locally hosted custom game modes.

// Map Entity Permissions and Script Execution

// The most critical variable for custom local environments is sv_allow_point_servercommand. 
// In the Source Engine architecture, mappers utilize a specific entity called point_servercommand 
// to allow map logic to execute console commands. 
// For security reasons, Valve defaults this to official to prevent malicious community maps from altering a client's settings. 
// However, complex training maps—most notably tr_walkway—rely entirely on this entity to spawn bots, manage their health states, 
// and manipulate their pathing vectors. 
// Setting this to always explicitly instructs the engine to process all map-driven command calls, 
// ensuring custom training environments function exactly as the mapper intended.

// Developer Sandbox and Constraint Bypassing

// To transform a standard match into a true testing environment, sv_cheats must be toggled on. 
// Activating this boolean variable fundamentally changes the engine's state, 
// lifting restrictions on a wide array of server-side commands and client-side rendering variables. 
// Mechanically, it allows the host to manipulate physics boundaries (via noclip), 
// instantly modify entity data (like health or ammo), and enable diagnostic overlays, 
// such as hitboxes (sv_showhitboxes) or weapon spread patterns.

// Game State and Flow Control

// Local testing often requires bypassing the standard game flow, particularly the "Waiting for Players" phase. 
// Enabling mp_tournament alters the game's state machine, suspending the standard timer and 
// objective systems until players manually ready up. This allows for immediate map exploration without 
// the engine attempting to force a round start or restart due to a lack of connected clients. 
// Additionally, variables like mp_waitingforplayers_cancel and mp_disable_respawn_times are utilized to strip away the downtime built into 
// standard server operations, allowing for uninterrupted testing loops and instant resetting of player states.

// __________________________________________________________________________________________________________________________________________________________________________

// __________________________________________________________________________________________________________________________________________________________________________
//
// Map Entity Permissions - Required for complex training maps (e.g., tr_walkway) to execute internal logic.
//
// __________________________________________________________________________________________________________________________________________________________________________

sv_allow_point_servercommand always

// __________________________________________________________________________________________________________________________________________________________________________
//
// Sandbox Controls - Lifts engine restrictions for diagnostic overlays, noclip, and testing commands.
//
// __________________________________________________________________________________________________________________________________________________________________________

sv_cheats 1

// __________________________________________________________________________________________________________________________________________________________________________
//
// Game State Flow - Bypasses the standard round structure and "Waiting for Players" phases.
//
// __________________________________________________________________________________________________________________________________________________________________________

mp_tournament 1                     
mp_waitingforplayers_cancel 1       
mp_disable_respawn_times 1

// __________________________________________________________________________________________________________________________________________________________________________
//
// Time and Limits - Disables map rotation and round limits to prevent the server from restarting.
//
// __________________________________________________________________________________________________________________________________________________________________________

mp_timelimit 0                      
mp_winlimit 0                       
mp_maxrounds 0

// __________________________________________________________________________________________________________________________________________________________________________
//
// Networking and Accessibility - Set to 0 if you are port forwarding and want friends to join your listen server.
//
// __________________________________________________________________________________________________________________________________________________________________________

// sv_lan 1
